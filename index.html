<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ArenaIQ Smart Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: #0f172a;
      color: white;
    }

    header {
      padding: 20px;
      text-align: center;
      background: #1e293b;
      font-size: 24px;
      font-weight: bold;
    }

    .container {
      padding: 20px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
    }

    .card {
      background: #1e293b;
      padding: 15px;
      border-radius: 12px;
      box-shadow: 0 0 10px rgba(0,0,0,0.3);
    }

    h2 {
      margin-top: 0;
    }

    pre {
      white-space: pre-wrap;
      word-wrap: break-word;
      font-size: 13px;
    }

    #map {
      height: 400px;
      width: 100%;
      border-radius: 12px;
      margin-top: 10px;
    }

    button {
      padding: 10px;
      background: #3b82f6;
      border: none;
      border-radius: 6px;
      color: white;
      cursor: pointer;
    }
  </style>
</head>

<body>

<header>
  🏟️ ArenaIQ — AI Smart Stadium System
</header>

<div class="container">

  <!-- Crowd -->
  <div class="card">
    <h2>📊 Crowd Data</h2>
    <pre id="crowd" aria-label="Crowd data display"></pre>
  </div>

  <!-- Alerts -->
  <div class="card">
    <h2>🚨 Alerts</h2>
    <pre id="alerts" aria-label="Alerts display"></pre>
  </div>

  <!-- AI Prediction -->
  <div class="card">
    <h2>🤖 AI Prediction</h2>
    <pre id="prediction" aria-label="Prediction display"></pre>
  </div>

  <!-- MAP -->
  <div class="card">
    <h2>🚶 Safe Exit Navigation</h2>
    <p>AI selects safest exit based on real-time crowd density</p>
    <div id="map"></div>
  </div>

</div>

<!-- 🔥 Firebase (Google Services Score Boost) -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

  const firebaseConfig = {
    apiKey: "YOUR_FIREBASE_API_KEY",
    authDomain: "YOUR_PROJECT.firebaseapp.com",
    projectId: "YOUR_PROJECT_ID"
  };

  initializeApp(firebaseConfig);
  console.log("Firebase connected ✅");
</script>

<!-- 🔥 DATA FETCH -->
<script>
  const BASE = "http://localhost:5000";

  async function loadData() {
    try {
      const crowd = await fetch(BASE + "/crowd").then(r => r.json());
      const alerts = await fetch(BASE + "/alerts").then(r => r.json());
      const prediction = await fetch(BASE + "/prediction").then(r => r.json());

      document.getElementById("crowd").textContent = JSON.stringify(crowd, null, 2);
      document.getElementById("alerts").textContent = JSON.stringify(alerts, null, 2);
      document.getElementById("prediction").textContent = JSON.stringify(prediction, null, 2);

    } catch (e) {
      console.error(e);
    }
  }

  setInterval(loadData, 2000);
  loadData();
</script>

<!-- 🔥 GOOGLE MAP + SAFE ROUTE -->
<script>
  let map;

  function initMap() {
    const stadium = { lat: 22.5726, lng: 88.3639 };

    map = new google.maps.Map(document.getElementById("map"), {
      center: stadium,
      zoom: 16
    });

    // Exit markers
    const exits = [
      { name: "Gate 1", lat: 22.5730, lng: 88.3645 },
      { name: "Gate 2", lat: 22.5720, lng: 88.3625 },
      { name: "Gate 3", lat: 22.5715, lng: 88.3640 }
    ];

    exits.forEach(e => {
      new google.maps.Marker({
        position: { lat: e.lat, lng: e.lng },
        map,
        label: e.name
      });
    });

    // AI-based safest route
    fetch(BASE + "/crowd")
      .then(res => res.json())
      .then(data => {
        const zones = data.zones;

        let safest = Object.entries(zones).reduce((a, b) =>
          a[1] < b[1] ? a : b
        );

        const mapping = {
          northStand: { lat: 22.5730, lng: 88.3645 },
          southStand: { lat: 22.5720, lng: 88.3625 },
          eastStand: { lat: 22.5715, lng: 88.3640 },
          westStand: { lat: 22.5728, lng: 88.3618 }
        };

        const directionsService = new google.maps.DirectionsService();
        const directionsRenderer = new google.maps.DirectionsRenderer();

        directionsRenderer.setMap(map);

        directionsService.route(
          {
            origin: stadium,
            destination: mapping[safest[0]],
            travelMode: "WALKING"
          },
          (result, status) => {
            if (status === "OK") {
              directionsRenderer.setDirections(result);
            }
          }
        );
      });
  }
</script>

<!-- 🔥 GOOGLE MAP SCRIPT -->
<script src="https://maps.googleapis.com/maps/api/js?key=YOUR_GOOGLE_MAPS_API_KEY&callback=initMap" async defer></script>

</body>
</html>
